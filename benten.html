<!DOCTYPE html>
<html>
<head>
    <title>Ben 10 Character Selector</title>
</head>

<body>

<h2>Choose Your Favorite Ben 10 Character</h2>


<select id="characterSelect">
    <option value="ben">Ben</option>
    <option value="heatblast">Heatblast</option>
    <option value="fourarms">Four Arms</option>
</select>

<br><br>


<img id="characterImage" src="images/ben.jpg" width="300" alt="Ben 10 Character">

<script>

   
    const characterDropdown = document.getElementById("characterSelect");
    const characterImg = document.getElementById("characterImage");

 
    characterDropdown.addEventListener("change", function () {

       
        let selectedCharacter = characterDropdown.value;

       
        characterImg.src = "images/" + selectedCharacter + ".jpg";

    });

</script>

</body>
</html>
